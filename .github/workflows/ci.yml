name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:


# Restrict default token permissions across all jobs
permissions:
  contents: read

jobs: 
  sonarqube:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        # Disabling shallow clones is recommended for improving the relevancy of reporting
        fetch-depth: 0
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0 
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  checktypes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Run pyright
        run: uvx --no-build pyright==1.1.409

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Run ruff
        run: uvx --no-build ruff==0.15.12 check .

  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run ShellCheck
        run: find . -type f -name "*.sh" -exec shellcheck {} +

  securitycheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Run bandit
        run: uvx --no-build bandit==1.9.4 -c bandit.yaml ./*.py

  pipaudit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Run pip-audit
        run: uv export --no-hashes | uvx --no-build --python 3.13 pip-audit==2.10.0 -r /dev/stdin

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: uv run pytest
        env:
          TEST_CYLERA_BASE_URL: ${{ secrets.TEST_CYLERA_BASE_URL }}
          TEST_CYLERA_USERNAME: ${{ secrets.TEST_CYLERA_USERNAME }}
          TEST_CYLERA_PASSWORD: ${{ secrets.TEST_CYLERA_PASSWORD }}
          TEST_SWITCH_CYLERA_BASE_URL: ${{ secrets.TEST_SWITCH_CYLERA_BASE_URL }}
          TEST_SWITCH_CYLERA_USERNAME: ${{ secrets.TEST_SWITCH_CYLERA_USERNAME }}
          TEST_SWITCH_CYLERA_PASSWORD: ${{ secrets.TEST_SWITCH_CYLERA_PASSWORD }}

