name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run ruff
        run: uvx ruff check .

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: uv run pytest
        env:
          TEST_CYLERA_BASE_URL: ${{ secrets.TEST_CYLERA_BASE_URL }}
          TEST_CYLERA_USERNAME: ${{ secrets.TEST_CYLERA_USERNAME }}
          TEST_CYLERA_PASSWORD: ${{ secrets.TEST_CYLERA_PASSWORD }}
          TEST_SWITCH_CYLERA_BASE_URL: ${{ secrets.TEST_SWITCH_CYLERA_BASE_URL }}
          TEST_SWITCH_CYLERA_USERNAME: ${{ secrets.TEST_SWITCH_CYLERA_USERNAME }}
          TEST_SWITCH_CYLERA_PASSWORD: ${{ secrets.TEST_SWITCH_CYLERA_PASSWORD }}

