name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.0)"
        required: true
      dry_run:
        description: "Publish to TestPyPI instead of PyPI (no real release)"
        type: boolean
        default: true

# Only the release job needs contents: write - all other jobs use read
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check version not already published
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            PYPI_URL="https://test.pypi.org/pypi/cylera-client/$INPUT_VERSION/json"
            REGISTRY="TestPyPI"
          else
            PYPI_URL="https://pypi.org/pypi/cylera-client/$INPUT_VERSION/json"
            REGISTRY="PyPI"
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PYPI_URL")
          if [ "$STATUS" = "200" ]; then
            echo "Error: Version $INPUT_VERSION already exists on $REGISTRY. Bump the version in pyproject.toml first."
            exit 1
          fi
          echo "Version $INPUT_VERSION is not yet on $REGISTRY. Proceeding."

      - name: Check pyproject.toml version matches input
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          PYPROJECT_VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$PYPROJECT_VERSION" != "$INPUT_VERSION" ]; then
            echo "Error: Input version $INPUT_VERSION does not match pyproject.toml version $PYPROJECT_VERSION."
            echo "Please update pyproject.toml before triggering the release."
            exit 1
          fi
          echo "Version $INPUT_VERSION matches pyproject.toml. Proceeding."

  checktypes:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - name: Run pyright
        run: uvx --no-build pyright==1.1.409

  lint:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - name: Run ruff
        run: uvx --no-build ruff==0.15.12 check .

  shellcheck:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run ShellCheck
        run: find . -type f -name "*.sh" -exec shellcheck {} +

  securitycheck:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - name: Run bandit
        run: uvx --no-build bandit==1.9.4 -c bandit.yaml ./*.py

  pipaudit:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - name: Run pip-audit
        run: uv export --no-hashes | uvx --no-build --python 3.13 pip-audit==2.10.0 -r /dev/stdin

  test:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --locked --all-extras --dev # NOSONAR
      - name: Run tests
        run: uv run --frozen pytest # NOSONAR
        env:
          TEST_CYLERA_BASE_URL: ${{ secrets.TEST_CYLERA_BASE_URL }}
          TEST_CYLERA_USERNAME: ${{ secrets.TEST_CYLERA_USERNAME }}
          TEST_CYLERA_PASSWORD: ${{ secrets.TEST_CYLERA_PASSWORD }}
          TEST_SWITCH_CYLERA_BASE_URL: ${{ secrets.TEST_SWITCH_CYLERA_BASE_URL }}
          TEST_SWITCH_CYLERA_USERNAME: ${{ secrets.TEST_SWITCH_CYLERA_USERNAME }}
          TEST_SWITCH_CYLERA_PASSWORD: ${{ secrets.TEST_SWITCH_CYLERA_PASSWORD }}

  release:
    runs-on: ubuntu-latest
    needs: [checktypes, lint, shellcheck, securitycheck, pipaudit, test]
    environment: release
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI (dry run)
        if: inputs.dry_run == true
        run: uv publish --publish-url https://test.pypi.org/legacy/
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_UV_PUBLISH_TOKEN }}

      - name: Publish to PyPI
        if: inputs.dry_run == false
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}

      - name: Wait for propagation and verify install (dry run)
        if: inputs.dry_run == true
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          echo "Waiting for TestPyPI to propagate..."
          sleep 30
          for i in $(seq 1 10); do
            echo "Attempt $i: installing cylera-client==$INPUT_VERSION from TestPyPI..."
            if uv run --refresh --with "cylera-client==$INPUT_VERSION" --index https://test.pypi.org/simple/ --index-strategy unsafe-best-match --no-project python -c "import cylera_client; print('ok')"; then # NOSONAR
              echo "Verification successful."
              exit 0
            fi
            echo "Not available yet, retrying..."
            sleep 15
          done
          echo "Error: Package could not be verified after 10 attempts."
          exit 1

      - name: Wait for propagation and verify install
        if: inputs.dry_run == false
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          echo "Waiting for PyPI to propagate..."
          sleep 30
          for i in $(seq 1 10); do
            echo "Attempt $i: installing cylera-client==$INPUT_VERSION..."
            if uv run --refresh --with "cylera-client==$INPUT_VERSION" --no-project python -c "import cylera_client; print('ok')"; then
              echo "Verification successful."
              exit 0
            fi
            echo "Not available yet, retrying..."
            sleep 15
          done
          echo "Error: Package could not be verified after 10 attempts."
          exit 1

      - name: Create git tag
        if: inputs.dry_run == false
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$INPUT_VERSION" -m "Release v$INPUT_VERSION"
          git push origin "v$INPUT_VERSION"

      - name: Generate changelog
        if: inputs.dry_run == false
        run: uvx --no-build git-cliff==2.10.1 --latest --strip header -o CHANGES.md

      - name: Create GitHub Release
        if: inputs.dry_run == false
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v$INPUT_VERSION" \
            --title "v$INPUT_VERSION" \
            --notes-file CHANGES.md \
            dist/*

      - name: Dry run complete
        if: inputs.dry_run == true
        run: |
          echo "Dry run complete. Package was published to TestPyPI and verified successfully."
          echo "To do a real release, trigger this workflow again with dry_run unchecked."
